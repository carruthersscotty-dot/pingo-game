<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINGO - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #003087;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            text-align: center;
            color: #FFD700;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .login-box {
            background: white;
            color: #003087;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .login-box h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #003087;
            border-radius: 8px;
            font-size: 1rem;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: #FFD700;
            color: #003087;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box button:hover {
            background: #FFC700;
            transform: translateY(-2px);
        }

        .error {
            color: #FF6B6B;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
        }

        .admin-panel.active {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            color: #FFD700;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .btn-danger {
            background: #FF6B6B;
            color: white;
        }

        .btn-danger:hover {
            background: #FF5252;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: #FFA500;
            color: white;
        }

        .btn-warning:hover {
            background: #FF8C00;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: #003087;
        }

        .btn-secondary:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .sessions-table {
            background: white;
            color: #003087;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #003087;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .badge-active {
            background: #4CAF50;
            color: white;
        }

        .badge-inactive {
            background: #999;
            color: white;
        }

        .badge-ended {
            background: #FFD700;
            color: #003087;
        }

        .delete-btn {
            padding: 6px 12px;
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #FF5252;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #FFD700;
        }

        .no-sessions {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9rem;
            color: #FFD700;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            table {
                font-size: 0.9rem;
            }

            th, td {
                padding: 10px;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div id="loginScreen" class="login-screen">
            <div class="login-box">
                <h2>🔐 Admin Login</h2>
                <p style="text-align: center; margin-bottom: 20px; opacity: 0.7;">Enter admin password to continue</p>
                <input type="password" id="adminPassword" placeholder="Admin Password" onkeypress="handleKeyPress(event)">
                <button onclick="login()">Login</button>
                <div id="loginError" class="error"></div>
            </div>
        </div>

        <!-- Admin Panel -->
        <div id="adminPanel" class="admin-panel">
            <h1>🛠️ PINGO Admin Panel</h1>
            <div class="subtitle">Session Management & Cleanup</div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalSessions">0</div>
                    <div class="stat-label">Total Sessions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="activeSessions">0</div>
                    <div class="stat-label">Active Sessions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="endedSessions">0</div>
                    <div class="stat-label">Ended Sessions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalPlayers">0</div>
                    <div class="stat-label">Total Players</div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="btn btn-danger" onclick="deleteEndedSessions()">🗑️ Delete All Ended Sessions</button>
                <button class="btn btn-warning" onclick="deleteInactiveSessions()">⏰ Delete Inactive Sessions (24h+)</button>
                <button class="btn btn-danger" onclick="deleteAllSessions()">💣 Delete ALL Sessions</button>
                <button class="btn btn-primary" onclick="refreshSessions()">🔄 Refresh</button>
                <button class="btn btn-secondary" onclick="logout()">← Logout</button>
            </div>

            <!-- Sessions Table -->
            <div class="sessions-table">
                <div id="loadingMessage" class="loading">Loading sessions...</div>
                <div id="noSessions" class="no-sessions" style="display: none;">No sessions found</div>
                <table id="sessionsTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>Session Code</th>
                            <th>Name</th>
                            <th>City</th>
                            <th>Players</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sessionsBody">
                    </tbody>
                </table>
            </div>

            <div class="footer">BY GROUP OF SIX - ADMIN PANEL</div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        let db;
        const ADMIN_PASSWORD = 'pingo2024'; // CHANGE THIS TO YOUR SECURE PASSWORD

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                login();
            }
        }

        function login() {
            const password = document.getElementById('adminPassword').value;
            const errorEl = document.getElementById('loginError');

            if (password === ADMIN_PASSWORD) {
                errorEl.textContent = '';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');
                initAdmin();
            } else {
                errorEl.textContent = '❌ Incorrect password';
                document.getElementById('adminPassword').value = '';
            }
        }

        function logout() {
            if (confirm('Logout from admin panel?')) {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('adminPanel').classList.remove('active');
                document.getElementById('adminPassword').value = '';
            }
        }

        async function initAdmin() {
            try {
                db = firebase.database();
                console.log('✅ Firebase initialized');
                await loadSessions();
            } catch (error) {
                console.error('Firebase init error:', error);
                alert('Failed to initialize Firebase: ' + error.message);
            }
        }

        async function loadSessions() {
            try {
                const snapshot = await db.ref('sessions').once('value');
                const sessions = snapshot.val();

                document.getElementById('loadingMessage').style.display = 'none';

                if (!sessions) {
                    document.getElementById('noSessions').style.display = 'block';
                    document.getElementById('sessionsTable').style.display = 'none';
                    updateStats(0, 0, 0, 0);
                    return;
                }

                document.getElementById('noSessions').style.display = 'none';
                document.getElementById('sessionsTable').style.display = 'table';

                const tbody = document.getElementById('sessionsBody');
                tbody.innerHTML = '';

                let totalSessions = 0;
                let activeSessions = 0;
                let endedSessions = 0;
                let totalPlayers = 0;

                Object.keys(sessions).forEach(code => {
                    const session = sessions[code];
                    totalSessions++;

                    const onlinePlayers = session.players ? 
                        Object.values(session.players).filter(p => p.online).length : 0;
                    const totalSessionPlayers = session.players ? 
                        Object.keys(session.players).length : 0;

                    totalPlayers += totalSessionPlayers;

                    const hasWinner = session.winners && Object.keys(session.winners).length > 0;
                    const createdDate = new Date(session.createdAt);
                    const age = Date.now() - session.createdAt;
                    const ageHours = Math.floor(age / (1000 * 60 * 60));

                    let status, statusClass;
                    if (hasWinner) {
                        status = 'Ended';
                        statusClass = 'badge-ended';
                        endedSessions++;
                    } else if (onlinePlayers > 0) {
                        status = 'Active';
                        statusClass = 'badge-active';
                        activeSessions++;
                    } else {
                        status = 'Inactive';
                        statusClass = 'badge-inactive';
                    }

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${code}</strong></td>
                        <td>${session.name}</td>
                        <td>${session.city}</td>
                        <td>${onlinePlayers}/${totalSessionPlayers}</td>
                        <td><span class="badge ${statusClass}">${status}</span></td>
                        <td>${createdDate.toLocaleDateString()} ${createdDate.toLocaleTimeString()}<br>
                            <small style="opacity: 0.7;">(${ageHours}h ago)</small>
                        </td>
                        <td>
                            <button class="delete-btn" onclick="deleteSession('${code}', '${session.name}')">🗑️ Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                updateStats(totalSessions, activeSessions, endedSessions, totalPlayers);

            } catch (error) {
                console.error('Error loading sessions:', error);
                alert('Failed to load sessions: ' + error.message);
            }
        }

        function updateStats(total, active, ended, players) {
            document.getElementById('totalSessions').textContent = total;
            document.getElementById('activeSessions').textContent = active;
            document.getElementById('endedSessions').textContent = ended;
            document.getElementById('totalPlayers').textContent = players;
        }

        async function deleteSession(code, name) {
            if (confirm(`Delete session "${name}" (${code})?\n\nThis action cannot be undone.`)) {
                try {
                    await db.ref(`sessions/${code}`).remove();
                    console.log(`✅ Deleted session: ${code}`);
                    await refreshSessions();
                } catch (error) {
                    console.error('Error deleting session:', error);
                    alert('Failed to delete session: ' + error.message);
                }
            }
        }

        async function deleteEndedSessions() {
            if (!confirm('Delete ALL ended sessions (games with winners)?\n\nThis action cannot be undone.')) {
                return;
            }

            try {
                const snapshot = await db.ref('sessions').once('value');
                const sessions = snapshot.val();

                if (!sessions) {
                    alert('No sessions to delete');
                    return;
                }

                let deleted = 0;
                for (const code in sessions) {
                    const session = sessions[code];
                    const hasWinner = session.winners && Object.keys(session.winners).length > 0;
                    
                    if (hasWinner) {
                        await db.ref(`sessions/${code}`).remove();
                        deleted++;
                        console.log(`✅ Deleted ended session: ${code}`);
                    }
                }

                alert(`✅ Deleted ${deleted} ended session(s)`);
                await refreshSessions();

            } catch (error) {
                console.error('Error deleting ended sessions:', error);
                alert('Failed to delete sessions: ' + error.message);
            }
        }

        async function deleteInactiveSessions() {
            if (!confirm('Delete sessions inactive for 24+ hours?\n\nThis action cannot be undone.')) {
                return;
            }

            try {
                const snapshot = await db.ref('sessions').once('value');
                const sessions = snapshot.val();

                if (!sessions) {
                    alert('No sessions to delete');
                    return;
                }

                const cutoffTime = Date.now() - (24 * 60 * 60 * 1000); // 24 hours ago
                let deleted = 0;

                for (const code in sessions) {
                    const session = sessions[code];
                    const age = session.createdAt;
                    const onlinePlayers = session.players ? 
                        Object.values(session.players).filter(p => p.online).length : 0;
                    
                    // Delete if older than 24h AND no online players
                    if (age < cutoffTime && onlinePlayers === 0) {
                        await db.ref(`sessions/${code}`).remove();
                        deleted++;
                        console.log(`✅ Deleted inactive session: ${code}`);
                    }
                }

                alert(`✅ Deleted ${deleted} inactive session(s)`);
                await refreshSessions();

            } catch (error) {
                console.error('Error deleting inactive sessions:', error);
                alert('Failed to delete sessions: ' + error.message);
            }
        }

        async function deleteAllSessions() {
            const confirm1 = confirm('⚠️ DELETE ALL SESSIONS?\n\nThis will remove EVERY session from the database.');
            if (!confirm1) return;

            const confirm2 = confirm('Are you ABSOLUTELY SURE?\n\nThis action CANNOT be undone!');
            if (!confirm2) return;

            try {
                await db.ref('sessions').remove();
                console.log('✅ Deleted all sessions');
                alert('✅ All sessions deleted');
                await refreshSessions();

            } catch (error) {
                console.error('Error deleting all sessions:', error);
                alert('Failed to delete sessions: ' + error.message);
            }
        }

        async function refreshSessions() {
            document.getElementById('loadingMessage').style.display = 'block';
            document.getElementById('sessionsTable').style.display = 'none';
            await loadSessions();
        }

        // Auto-refresh every 30 seconds
        setInterval(() => {
            if (document.getElementById('adminPanel').classList.contains('active')) {
                refreshSessions();
            }
        }, 30000);
    </script>
</body>
</html>

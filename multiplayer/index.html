<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINGO - Multiplayer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Welcome Screen -->
        <div id="welcome-screen" class="screen active">
            <div class="container">
                <h1>🎉 PINGO GAME 🎉</h1>
                <p class="tagline">THE PICTURE BINGO - MULTIPLAYER EDITION</p>
                <div class="welcome-options">
                    <div class="option-card">
                        <h2>Create New Group</h2>
                        <input type="text" id="new-group-name" placeholder="Enter group name">
                        <button id="create-group-btn" class="btn btn-primary">Create Group</button>
                    </div>
                    <div class="divider">OR</div>
                    <div class="option-card">
                        <h2>Join Existing Group</h2>
                        <input type="text" id="join-group-code" placeholder="Enter group code">
                        <button id="join-group-btn" class="btn btn-secondary">Join Group</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Admin/Upload Screen -->
        <div id="admin-screen" class="screen">
            <div class="container">
                <div class="header">
                    <h2>Setup: <span id="admin-group-name"></span></h2>
                    <p class="group-code">Group Code: <strong id="admin-group-code"></strong></p>
                </div>

                <div class="upload-section">
                    <h3>Upload 25 Images</h3>
                    <p class="instructions">Images should be square (recommended: 300x300px or larger), PNG/JPG format, max 2MB each</p>
                    
                    <input type="file" id="image-upload" accept="image/png,image/jpeg,image/jpg" multiple style="display:none">
                    <button id="upload-btn" class="btn btn-primary">
                        <span>📤 Select Images</span>
                    </button>
                    
                    <div id="upload-progress" class="upload-progress" style="display:none;">
                        <div class="progress-bar">
                            <div id="progress-fill" class="progress-fill"></div>
                        </div>
                        <p id="upload-status">Uploading...</p>
                    </div>

                    <div id="image-preview" class="image-grid"></div>
                </div>

                <button id="start-game-btn" class="btn btn-success" style="display:none;">Start Game</button>
                <button id="logout-btn" class="btn btn-danger">Leave Group</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="container">
                <div class="game-header">
                    <div class="game-info">
                        <h2 id="game-group-name"></h2>
                        <p class="group-code">Code: <strong id="game-group-code"></strong></p>
                    </div>
                    <div class="game-controls">
                        <button id="shuffle-btn" class="btn btn-small">🔀 Shuffle</button>
                        <button id="reset-btn" class="btn btn-small">↺ Reset</button>
                        <button id="leave-game-btn" class="btn btn-small btn-danger">Leave</button>
                    </div>
                </div>

                <div id="pingo-board" class="pingo-board">
                    <!-- 5x5 grid will be generated here -->
                </div>

                <div class="game-status">
                    <div id="players-online" class="players-count">Players: 0</div>
                    <div id="game-messages" class="messages"></div>
                </div>
            </div>
        </div>

        <!-- Winner Modal -->
        <div id="winner-modal" class="modal">
            <div class="modal-content">
                <h2>🎉 PINGO! 🎉</h2>
                <p id="winner-text"></p>
                <button id="play-again-btn" class="btn btn-primary">Play Again</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>

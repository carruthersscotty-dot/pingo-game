<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINGO - Menu</title>
<style>
body { font-family: 'Arial Black', sans-serif; text-align: center; margin: 0; padding: 0; min-height: 100vh; background-color: #003087; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
h1 { font-size: 4.5rem; margin: 0; line-height: 1; }
.sub-title { font-size: 1.4rem; color: #FFD700; font-weight: bold; letter-spacing: 2px; margin: 10px 0 20px 0; }

/* HET GROTE BEWEGENDE LOGO - VERBETERDE VERSIE */
.logo-wrapper { 
  font-size: 100px; 
  margin: 40px 0; 
  height: 1.4em; 
  display: flex; 
  align-items: center; 
}

.logo-container { 
  display: flex; 
  align-items: center; 
  position: relative; 
  animation: hoofdDraai 1.8s ease-out forwards; 
}

.outline-letter { 
  color: transparent; 
  -webkit-text-stroke: 0.015em #ffffff; 
  position: relative; 
  z-index: 10; 
}

.g { margin-right: -0.32em; }
.zes { margin-left: -0.32em; }

.off-sectie { 
  position: relative; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  width: 0.7em; 
}

.o { 
  font-size: 0.65em; 
  position: relative; 
  top: 0.04em; 
  z-index: 5; /* O staat in het midden */
}

.f2 { 
  position: absolute; 
  left: 50%;
  top: 50%;
  color: transparent; 
  -webkit-text-stroke: 1px #ffffff; 
  font-size: 0.53em; 
  font-weight: 200; 
  font-family: Arial, sans-serif; 
  z-index: 11;
  opacity: 0; /* Begint onzichtbaar, dus je ziet hem niet meedraaien */
  
  /* Startpositie: Hoog bovenin */
  transform: translate(-50%, -10em) scaleX(1.5) scaleY(4.5);
  
  /* De animatie: start na 1.8s (als het draaien klaar is) */
  animation: fInval 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2) 1.8s forwards; 
}

@keyframes hoofdDraai { 
  0% { transform: rotate(-180deg) scale(0.2); opacity: 0; } 
  70% { transform: rotate(10deg) scale(1.05); opacity: 1; } 
  100% { transform: rotate(0deg) scale(1); opacity: 1; } 
}

@keyframes fInval { 
  0% {
    opacity: 0;
    transform: translate(-50%, -10em) scaleX(1.5) scaleY(4.5);
  }
  1% {
    opacity: 1; /* Wordt pas hier zichtbaar */
  }
  100% { 
    transform: translate(-50%, -50%) scaleX(1.5) scaleY(4.5); 
    opacity: 1; 
  } 
}

/* SESSION CARDS SECTION */
.sessions-section { 
  width: 90%; 
  max-width: 1000px; 
  margin: 30px auto; 
  min-height: 300px;
}

.sessions-header {
  font-size: 1.5rem;
  color: #FFD700;
  margin-bottom: 20px;
  font-weight: bold;
}

.sessions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 20px;
}

.session-card {
  background: white;
  color: #003087;
  padding: 25px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.session-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
}

.session-card.create-new {
  background: linear-gradient(135deg, #FFD700, #FFA500);
  border: 3px dashed #003087;
}

.session-card.create-new:hover {
  background: linear-gradient(135deg, #FFC700, #FF8C00);
}

.session-icon {
  font-size: 3rem;
  margin-bottom: 10px;
}

.session-name {
  font-size: 1.3rem;
  font-weight: bold;
  margin-bottom: 10px;
}

.session-city {
  font-size: 1rem;
  opacity: 0.7;
  margin-bottom: 10px;
}

.session-players {
  font-size: 0.9rem;
  color: #4CAF50;
  font-weight: bold;
}

.loading-text {
  color: #FFD700;
  font-size: 1.2rem;
  padding: 40px;
}

.no-sessions-text {
  color: #FFD700;
  font-size: 1.1rem;
  opacity: 0.7;
  padding: 40px;
  font-style: italic;
}

.footer { 
  font-size: 0.9rem; 
  margin-top: 30px; 
  color: #FFD700; 
  opacity: 0.7; 
  letter-spacing: 1px; 
}

@media (max-width: 768px) {
  .sessions-grid {
    grid-template-columns: 1fr;
  }
}
</style>

</head>
<body>

<h1>PINGO</h1>
<div class="sub-title">THE PICTURE BINGO</div>

<div class="logo-wrapper">
  <div class="logo-container">
    <span class="outline-letter g">G</span>
    <div class="off-sectie">
      <span class="outline-letter o">O</span>
      <span class="f2">f</span>
    </div>
    <span class="outline-letter zes">6</span>
  </div>
</div>

<div class="sessions-section">
  <div class="sessions-header">🎮 Active Sessions & Create New</div>
  <div id="sessionsGrid" class="sessions-grid">
    <div class="loading-text">Loading sessions...</div>
  </div>
</div>

<div class="footer">BY GROUP OF SIX</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
let db;
let availableCities = [];

// List of all possible game folders to check
const allGames = [
    'Toronto-1', 'Toronto-2', 'Toronto-Zoo',
    'General-1', 'General-2', 'General-3', 'General-4', 'General-5',
    'Halifax', 'Nova-Scotia', 'Cabot-Trail',
    'Vancouver', 'Netherlands', 'Amsterdam', 'Schiphol',
    'Groningen', 'Leuven', 'cars', 'Vienna',
    'Edinburgh', 'Valencia', 'Malaga', 'Road-trip-1',
    'MyCustomGame'
];

// Check if a game folder exists by trying to load an image
async function checkGameExists(gameName) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => {
            const img2 = new Image();
            img2.onload = () => resolve(true);
            img2.onerror = () => resolve(false);
            img2.src = `${gameName}/1.JPG`;
        };
        img.src = `${gameName}/1.jpg`;
    });
}

// Find available cities/games
async function loadAvailableCities() {
    for (const game of allGames) {
        const exists = await checkGameExists(game);
        if (exists) {
            availableCities.push(game);
        }
    }
    console.log('Available cities:', availableCities);
}

// Initialize Firebase and load sessions
async function init() {
    try {
        db = firebase.database();
        console.log('✅ Firebase initialized');

        await loadAvailableCities();
        loadActiveSessions();

    } catch (error) {
        console.error('Firebase init error:', error);
        document.getElementById('sessionsGrid').innerHTML = 
            '<div class="no-sessions-text">Could not load sessions</div>';
    }
}

// Load active sessions from Firebase
function loadActiveSessions() {
    const gridEl = document.getElementById('sessionsGrid');

    db.ref('sessions').on('value', (snapshot) => {
        const sessions = snapshot.val();
        gridEl.innerHTML = '';

        // Always show "Create New Session" card first
        const createCard = createNewSessionCard();
        gridEl.appendChild(createCard);

        if (!sessions) {
            return; // Only show create card
        }

        // Display existing sessions
        const sessionArray = [];
        Object.keys(sessions).forEach(code => {
            const session = sessions[code];
            const onlinePlayers = session.players ? 
                Object.values(session.players).filter(p => p.online).length : 0;

            sessionArray.push({
                code: code,
                name: session.name,
                city: session.city,
                playerCount: onlinePlayers,
                createdAt: session.createdAt
            });
        });

        // Sort by most recent
        sessionArray.sort((a, b) => b.createdAt - a.createdAt);

        // Create session cards
        sessionArray.forEach(session => {
            const card = createSessionCard(session);
            gridEl.appendChild(card);
        });
    });
}

// Create "Create New Session" card
function createNewSessionCard() {
    const card = document.createElement('div');
    card.className = 'session-card create-new';
    card.innerHTML = `
        <div class="session-icon">➕</div>
        <div class="session-name">Create New Session</div>
        <div class="session-city">Start your own game</div>
    `;
    card.onclick = () => createNewSession();
    return card;
}

// Create session card
function createSessionCard(session) {
    const card = document.createElement('div');
    card.className = 'session-card';
    card.innerHTML = `
        <div class="session-icon">🎮</div>
        <div class="session-name">${session.name}</div>
        <div class="session-city">${session.city}</div>
        <div class="session-players">${session.playerCount} player${session.playerCount !== 1 ? 's' : ''} online</div>
    `;
    card.onclick = () => joinSession(session.name, session.city);
    return card;
}

// Create new session
function createNewSession() {
    // Ask for city selection
    let cityOptions = availableCities.map((city, index) => `${index + 1}. ${city}`).join('\n');
    let cityChoice = prompt(`Select a city:\n\n${cityOptions}\n\nEnter number (1-${availableCities.length}):`);

    if (!cityChoice) return;

    const cityIndex = parseInt(cityChoice) - 1;
    if (cityIndex < 0 || cityIndex >= availableCities.length) {
        alert('Invalid choice');
        return;
    }

    const selectedCity = availableCities[cityIndex];

    // Ask for session name and player name
    const sessionName = prompt('Enter session name:');
    if (!sessionName || !sessionName.trim()) return;

    const playerName = prompt('Enter your name:');
    if (!playerName || !playerName.trim()) return;

    // Generate session code
    const sessionCode = Math.random().toString(36).substring(2, 8).toUpperCase();

    // Show code to creator
    alert(`Session created!\n\nSession Code: ${sessionCode}\n\nShare this code with friends to invite them.`);

    // Redirect to game
    window.location.href = `pingo-multiplayer.html?city=${selectedCity}&session=${sessionCode}&name=${encodeURIComponent(sessionName.trim())}&playerName=${encodeURIComponent(playerName.trim())}&mode=create`;
}

// Join existing session
function joinSession(sessionName, cityName) {
    const playerName = prompt(`Join "${sessionName}"\n\nEnter your name:`);
    if (!playerName || !playerName.trim()) return;

    const sessionCode = prompt('Enter session code:\n(You need the code from the session creator)');
    if (!sessionCode || !sessionCode.trim()) return;

    // Redirect to game WITH CITY PARAMETER
    window.location.href = `pingo-multiplayer.html?city=${cityName}&session=${sessionCode.trim().toUpperCase()}&playerName=${encodeURIComponent(playerName.trim())}&mode=join`;
}

window.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
